name: Metrics

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write   # needed to push to the metrics branch

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Profile summary
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ github.token }}
          committer_branch: main
          filename: metrics.profile.svg
          template: classic
          user: austinkimchi
          base: header, activity, community, repositories
          repositories_affiliations: owner
          config_timezone: America/Los_Angeles

      - name: Most used languages
        uses: lowlighter/metrics@master
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ github.token }}
          committer_branch: main
          filename: metrics.languages.svg
          template: classic
          user: austinkimchi
          base: ""
          repositories_affiliations: owner
          config_timezone: America/Los_Angeles
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_categories: programming
          plugin_languages_ignored: HTML, CSS, Less, EJS, Nunjucks
          plugin_languages_limit: 8

      - name: Contribution calendar
        uses: lowlighter/metrics@master
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ github.token }}
          committer_branch: main
          filename: metrics.calendar.svg
          template: classic
          user: austinkimchi
          base: ""
          repositories_affiliations: owner
          config_timezone: America/Los_Angeles
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
